<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time 2 - Tests</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .no-print { margin-bottom: 15px; text-align: center; }
        .no-print select, .no-print button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #aaa;
            background: white;
            cursor: pointer;
        }
        .no-print button {
            background: #007bff;
            color: white;
            border: none;
            font-weight: bold;
        }
        .no-print button:hover { background: #0056b3; }

        /* A4 page */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15mm 15mm 20mm;
            margin-bottom: 30px;
            page-break-after: always;
            line-height: 1.6;
            direction: ltr;
            text-align: left;
        }
        .a4-page:last-child { page-break-after: auto; }

        .logo-img {
            display: block;
            width: 100px;
            margin: 0 auto 10px;
        }

        .exam-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #007bff;
            padding-bottom: 8px;
        }

        .section {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            background: #fafafa;
        }

        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #333;
            border-left: 4px solid #007bff;
            padding-left: 8px;
        }

        /* Container for each question line + its image */
        .question-line {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            gap: 8px;
        }

        .question-text {
            flex: 1;
            white-space: pre-wrap;
        }

        .question-image {
            height: 50px;
            width: auto;
            border-radius: 4px;
            border: 1px solid #ddd;
            padding: 2px;
            background: white;
        }

        /* When image is above the whole section */
        .section-image-above {
            display: block;
            margin: 0 auto 10px;
            max-height: 80px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 20px;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .a4-page { box-shadow: none; margin: 0; padding: 10mm; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <select id="partSelect">
            <option value="A">Basic 2A</option>
            <option value="B">Basic 2B</option>
        </select>
        <select id="examSelect">
            <option value="1">Exam 1</option>
            <option value="2">Exam 2</option>
            <option value="3">Exam 3</option>
            <option value="4">Exam 4</option>
        </select>
        <button onclick="loadAndRender()">Show Exam</button>
        <button onclick="window.print()">🖨️ Print</button>
    </div>

    <div id="examContainer"></div>

    <script>
        function getJSONPath(part, num) {
            return `English%20time%202/ET2_${part}_Exam${num}.json`;
        }

        function getImagePath(filename) {
            return `English%20time%202/images/${filename}.jpg`;
        }

        async function loadAndRender() {
            const part = document.getElementById('partSelect').value;
            const num = document.getElementById('examSelect').value;
            const container = document.getElementById('examContainer');
            container.innerHTML = '<p style="text-align:center;">Loading...</p>';

            try {
                const res = await fetch(getJSONPath(part, num));
                if (!res.ok) throw new Error('File not found');
                const exam = await res.json();
                renderExam(exam, container);
            } catch (e) {
                container.innerHTML = `<p style="color:red;">Failed to load: ${e.message}</p>`;
            }
        }

        function renderExam(exam, container) {
            let html = `<div class="a4-page">`;
            html += `<img src="logo.png" class="logo-img" onerror="this.style.display='none'">`;
            html += `<div class="exam-title">${exam.title}</div>`;

            exam.sections.forEach(section => {
                html += `<div class="section">`;
                html += `<div class="section-title">${section.section_title}</div>`;

                const images = section.images || [];
                const lines = section.text.split('\n').filter(line => line.trim() !== '');
                
                // Check if any image has position "above"
                const aboveImage = images.find(img => img.position === 'above');
                if (aboveImage) {
                    const src = getImagePath(aboveImage.suggested_filename);
                    html += `<img src="${src}" class="section-image-above" onerror="this.style.display='none'" alt="">`;
                    // remove it from the list so it's not used again below
                    images.splice(images.indexOf(aboveImage), 1);
                }

                // If the number of remaining images matches number of lines, pair them
                if (images.length === lines.length) {
                    lines.forEach((line, idx) => {
                        html += `<div class="question-line">`;
                        html += `<span class="question-text">${line}</span>`;
                        const src = getImagePath(images[idx].suggested_filename);
                        html += `<img src="${src}" class="question-image" onerror="this.style.display='none'" alt="">`;
                        html += `</div>`;
                    });
                } else {
                    // fallback: just show the text, then any leftover images underneath
                    html += `<div class="question-text">${section.text.replace(/\n/g, '<br>')}</div>`;
                    if (images.length > 0) {
                        html += `<div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;">`;
                        images.forEach(img => {
                            const src = getImagePath(img.suggested_filename);
                            html += `<img src="${src}" class="question-image" onerror="this.style.display='none'" alt="">`;
                        });
                        html += `</div>`;
                    }
                }

                html += `</div>`; // end section
            });

            html += `<footer>English Time 2 &copy; 2025</footer>`;
            html += `</div>`; // end a4-page
            container.innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
</body>
</html>
