<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time 2 - اختبارات A4</title>
    <style>
        /* الأساسيات */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .no-print { margin-bottom: 15px; text-align: center; }
        .no-print select, .no-print button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #aaa;
            background: white;
            cursor: pointer;
        }
        .no-print button {
            background: #007bff;
            color: white;
            border: none;
            font-weight: bold;
        }
        .no-print button:hover { background: #0056b3; }

        /* صفحة A4 */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15mm 15mm 20mm;
            margin-bottom: 30px;
            position: relative;
            page-break-after: always;
            line-height: 1.7;
        }
        .a4-page:last-child { page-break-after: auto; }

        .logo-img {
            display: block;
            width: 120px;
            margin: 0 auto 10px;
        }

        .exam-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #007bff;
            padding-bottom: 8px;
        }

        .section {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            background: #fafafa;
        }

        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #333;
            border-right: 4px solid #007bff;
            padding-right: 8px;
        }

        .section-content {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-start;
        }

        .section-text {
            flex: 2;
            min-width: 250px;
            white-space: pre-wrap;
            background: white;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .images-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .image-item {
            text-align: center;
            max-width: 120px;
        }

        .image-item img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: white;
            padding: 3px;
        }

        .image-item .caption {
            font-size: 0.7rem;
            color: #555;
            margin-top: 2px;
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 20px;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .a4-page { box-shadow: none; margin: 0; padding: 10mm; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <select id="partSelect">
            <option value="A">Basic 2A</option>
            <option value="B">Basic 2B</option>
        </select>
        <select id="examSelect">
            <option value="1">الاختبار 1</option>
            <option value="2">الاختبار 2</option>
            <option value="3">الاختبار 3</option>
            <option value="4">الاختبار 4</option>
        </select>
        <button onclick="loadAndRender()">عرض الاختبار</button>
        <button onclick="window.print()">🖨️ طباعة</button>
    </div>

    <div id="examContainer"></div>

    <script>
        function getJSONPath(part, num) {
            return `English%20time%202/ET2_${part}_Exam${num}.json`;
        }

        function getImagePath(filename) {
            return `English%20time%202/images/${filename}.jpg`;
        }

        async function loadAndRender() {
            const part = document.getElementById('partSelect').value;
            const num = document.getElementById('examSelect').value;
            const container = document.getElementById('examContainer');
            container.innerHTML = '<p style="text-align:center;">جاري التحميل...</p>';

            try {
                const res = await fetch(getJSONPath(part, num));
                if (!res.ok) throw new Error('ملف غير موجود');
                const exam = await res.json();
                renderExam(exam, container);
            } catch (e) {
                container.innerHTML = `<p style="color:red;">فشل التحميل: ${e.message}</p>`;
            }
        }

        function renderExam(exam, container) {
            let html = `<div class="a4-page">`;
            html += `<img src="logo.png" class="logo-img" onerror="this.style.display='none'">`;
            html += `<div class="exam-title">${exam.title}</div>`;

            exam.sections.forEach(section => {
                html += `<div class="section">`;
                html += `<div class="section-title">${section.section_title}</div>`;
                html += `<div class="section-content">`;
                html += `<div class="section-text">${section.text.replace(/\n/g, '<br>')}</div>`;
                
                if (section.images && section.images.length > 0) {
                    html += `<div class="images-container">`;
                    section.images.forEach(img => {
                        const src = getImagePath(img.file);
                        html += `
                            <div class="image-item">
                                <img src="${src}" alt="${img.description}" onerror="this.style.display='none'">
                                <div class="caption">${img.description}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                
                html += `</div></div>`;
            });

            html += `<footer>English Time 2 &copy; 2025</footer>`;
            html += `</div>`;
            container.innerHTML = html;
        }

        // تحميل أول اختبار افتراضياً
        window.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
</body>
</html>
