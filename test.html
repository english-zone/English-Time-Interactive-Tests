<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time 2 - Tests</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .no-print { margin-bottom: 15px; text-align: center; }
        .no-print select, .no-print button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #aaa;
            background: white;
            cursor: pointer;
        }
        .no-print button {
            background: #007bff;
            color: white;
            border: none;
            font-weight: bold;
        }
        .no-print button:hover { background: #0056b3; }
        .no-print button:disabled { background: #6c757d; cursor: not-allowed; }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15mm 15mm 20mm;
            margin-bottom: 30px;
            page-break-after: always;
            line-height: 1.6;
            direction: ltr;
            text-align: left;
        }
        .a4-page:last-child { page-break-after: auto; }

        .logo-img {
            display: block;
            width: 100px;
            margin: 0 auto 10px;
        }

        .exam-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #007bff;
            padding-bottom: 8px;
        }

        .section {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            background: #fafafa;
        }

        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #333;
            border-left: 4px solid #007bff;
            padding-left: 8px;
        }

        .question-line {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            gap: 8px;
        }

        .question-text {
            flex: 1;
            white-space: pre-wrap;
        }

        .question-image {
            height: 50px;
            width: auto;
            border-radius: 4px;
            border: 1px solid #ddd;
            padding: 2px;
            background: white;
        }

        .section-image-above {
            display: block;
            margin: 0 auto 10px;
            max-height: 80px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 20px;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .a4-page { box-shadow: none; margin: 0; padding: 10mm; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <select id="partSelect">
            <option value="A">Basic 2A</option>
            <option value="B">Basic 2B</option>
        </select>
        <select id="examSelect">
            <option value="1">Exam 1</option>
            <option value="2">Exam 2</option>
            <option value="3">Exam 3</option>
            <option value="4">Exam 4</option>
        </select>
        <button id="showExamBtn">Show Exam</button>
        <button id="printBtn">🖨️ Print</button>
    </div>

    <div id="examContainer">
        <p style="text-align:center; color:#6c757d;">Select an exam and click "Show Exam".</p>
    </div>

    <script>
        const partSelect = document.getElementById('partSelect');
        const examSelect = document.getElementById('examSelect');
        const showBtn = document.getElementById('showExamBtn');
        const printBtn = document.getElementById('printBtn');
        const container = document.getElementById('examContainer');

        // ✅ المسار الصحيح مع تشفير المسافات تلقائياً
        function getJSONPath(part, num) {
            const folder = 'English time 2';  // اسم المجلد الحقيقي
            const filename = `ET2_${part}_Exam${num}.json`;
            // encodeURI يحول المسافات إلى %20 بشكل آمن
            return encodeURI(`${folder}/${filename}`);
        }

        function getImagePath(filename) {
            const folder = 'English time 2/images';
            return encodeURI(`${folder}/${filename}.jpg`);
        }

        async function loadAndRender() {
            const part = partSelect.value;
            const num = examSelect.value;

            showBtn.disabled = true;
            showBtn.textContent = 'Loading...';
            container.innerHTML = '<p style="text-align:center;">Loading exam, please wait...</p>';

            const url = getJSONPath(part, num);
            console.log('Fetching:', url);

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const statusText = `${response.status} ${response.statusText}`;
                    throw new Error(`HTTP ${statusText} — ${url}`);
                }
                const exam = await response.json();
                console.log('Exam loaded successfully:', exam.title);
                renderExam(exam);
            } catch (error) {
                console.error('Fetch error:', error);
                container.innerHTML = `
                    <p style="color:red; text-align:center;">
                        ❌ Failed to load exam.<br>
                        <small>Path: ${url}</small><br>
                        <small>Error: ${error.message}</small>
                    </p>`;
            } finally {
                showBtn.disabled = false;
                showBtn.textContent = 'Show Exam';
            }
        }

        function renderExam(exam) {
            let html = `<div class="a4-page">`;
            html += `<img src="logo.png" class="logo-img" onerror="this.style.display='none'" alt="Logo">`;
            html += `<div class="exam-title">${exam.title}</div>`;

            exam.sections.forEach(section => {
                html += `<div class="section">`;
                html += `<div class="section-title">${section.section_title}</div>`;

                const images = section.images || [];
                const allLines = section.text.split('\n');

                // الصور التي مكانها "above"
                const aboveImg = images.find(img => img.position === 'above');
                if (aboveImg) {
                    html += `<img src="${getImagePath(aboveImg.suggested_filename)}" class="section-image-above" onerror="this.style.display='none'" alt="">`;
                }

                const remainingImages = images.filter(img => img.position !== 'above');

                // استخراج الأسطر المرقمة
                const numberedLines = [];
                const otherLines = [];
                allLines.forEach(line => {
                    if (/^\d+[\.\s]/.test(line.trim())) {
                        numberedLines.push(line);
                    } else if (line.trim() !== '') {
                        otherLines.push(line);
                    }
                });

                // وصل الصور بالأسطر المرقمة إذا تطابق العدد
                if (remainingImages.length === numberedLines.length && numberedLines.length > 0) {
                    numberedLines.forEach((line, idx) => {
                        html += `<div class="question-line">`;
                        html += `<span class="question-text">${line}</span>`;
                        html += `<img src="${getImagePath(remainingImages[idx].suggested_filename)}" class="question-image" onerror="this.style.display='none'" alt="">`;
                        html += `</div>`;
                    });
                    if (otherLines.length > 0) {
                        html += `<div class="question-text" style="margin-top:6px;">${otherLines.join('<br>')}</div>`;
                    }
                } else {
                    html += `<div class="question-text">${section.text.replace(/\n/g, '<br>')}</div>`;
                    if (remainingImages.length > 0) {
                        html += `<div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;">`;
                        remainingImages.forEach(img => {
                            html += `<img src="${getImagePath(img.suggested_filename)}" class="question-image" onerror="this.style.display='none'" alt="">`;
                        });
                        html += `</div>`;
                    }
                }

                html += `</div>`;
            });

            html += `<footer>English Time 2 © 2025</footer>`;
            html += `</div>`;
            container.innerHTML = html;
        }

        showBtn.addEventListener('click', loadAndRender);
        printBtn.addEventListener('click', () => window.print());
    </script>
</body>
</html>
