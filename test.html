<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time 2 - Tests</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .no-print {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 210mm;
        }
        .file-label {
            display: inline-block;
            padding: 9px 16px;
            font-size: 0.9rem;
            border-radius: 8px;
            border: 2px dashed #007bff;
            background: #f0f7ff;
            color: #007bff;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .file-label:hover { background: #ddeeff; }
        #jsonFileInput, #logoFileInput { display: none; }
        .file-name {
            font-size: 0.82rem;
            color: #666;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .divider { width: 1px; height: 30px; background: #ddd; margin: 0 4px; }
        .btn {
            padding: 9px 20px;
            font-size: 0.95rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-primary:disabled { background: #6c757d; cursor: not-allowed; }
        .btn-print { background: #28a745; color: white; }
        .btn-print:hover { background: #1e7e34; }

        /* ── A4 ── */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 15mm 15mm 20mm;
            margin-bottom: 30px;
            page-break-after: always;
            line-height: 1.6;
            direction: ltr;
            text-align: left;
        }
        .a4-page:last-child { page-break-after: auto; }
        .logo-img { display: block; width: 100px; margin: 0 auto 10px; }
        .exam-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #007bff;
            padding-bottom: 8px;
        }
        .section {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            background: #fafafa;
        }
        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #333;
            border-left: 4px solid #007bff;
            padding-left: 8px;
        }

        /* ── صف سؤال + صورة يمين ── */
        .question-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .question-row .q-text { flex: 1; }
        .question-row .q-img {
            height: 55px;
            width: auto;
            border-radius: 4px;
            border: 1px solid #ddd;
            flex-shrink: 0;
        }

        /* ── صور فوق القسم (شبكة) ── */
        .above-images {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .above-images img {
            height: 70px;
            width: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* ── نص عادي ── */
        .plain-text { white-space: pre-wrap; line-height: 1.8; }

        footer { text-align: center; font-size: 0.8rem; color: #888; margin-top: 20px; }

        .help-box {
            width: 210mm;
            background: #fff8e1;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.7;
        }
        .help-box strong { color: #e65c00; }
        .help-box code { background: #f0f0f0; padding: 1px 6px; border-radius: 4px; font-family: monospace; }

        #statusMsg {
            width: 210mm;
            text-align: center;
            padding: 12px;
            font-size: 0.95rem;
            color: #555;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print, .help-box, #statusMsg { display: none !important; }
            .a4-page { box-shadow: none; margin: 0; padding: 10mm; page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <label class="file-label" for="jsonFileInput">📂 اختر ملف JSON</label>
    <input type="file" id="jsonFileInput" accept=".json">
    <span class="file-name" id="fileNameDisplay">لم يُختر ملف</span>
    <div class="divider"></div>
    <label class="file-label" for="logoFileInput" style="font-size:0.82rem;padding:7px 12px;">🖼️ لوجو</label>
    <input type="file" id="logoFileInput" accept="image/*">
    <div class="divider"></div>
    <button class="btn btn-primary" id="showExamBtn" disabled>▶ عرض الامتحان</button>
    <button class="btn btn-print"   id="printBtn"    disabled>🖨️ طباعة</button>
</div>

<div class="help-box" id="helpBox">
    <strong>📌 طريقة الاستخدام:</strong><br>
    1. اضغط <strong>"اختر ملف JSON"</strong> واختر الملف (مثل <code>ET2_A_Exam1.json</code>)<br>
    2. اضغط <strong>"عرض الامتحان"</strong><br>
    3. للطباعة اضغط <strong>"طباعة"</strong><br>
    ✅ يعمل مباشرة بدون سيرفر.
</div>

<div id="statusMsg">اختر ملف JSON لعرض الامتحان.</div>
<div id="examContainer"></div>

<script>
const jsonInput    = document.getElementById('jsonFileInput');
const logoInput    = document.getElementById('logoFileInput');
const showBtn      = document.getElementById('showExamBtn');
const printBtn     = document.getElementById('printBtn');
const container    = document.getElementById('examContainer');
const fileNameDisp = document.getElementById('fileNameDisplay');
const statusMsg    = document.getElementById('statusMsg');
const helpBox      = document.getElementById('helpBox');

let loadedExam  = null;
let logoDataURL = null;

// ── اختيار JSON ──────────────────────────────────────────────
jsonInput.addEventListener('change', () => {
    const file = jsonInput.files[0];
    if (!file) return;
    fileNameDisp.textContent = file.name;
    statusMsg.textContent = '⏳ جاري قراءة الملف...';
    showBtn.disabled = true;

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            loadedExam = JSON.parse(e.target.result);
            statusMsg.textContent = `✅ تم تحميل: ${loadedExam.title || file.name}`;
            showBtn.disabled = false;
            helpBox.style.display = 'none';
        } catch (err) {
            statusMsg.innerHTML = `<span style="color:red">❌ خطأ في قراءة JSON: ${err.message}</span>`;
            loadedExam = null;
        }
    };
    reader.onerror = () => {
        statusMsg.innerHTML = `<span style="color:red">❌ فشل قراءة الملف.</span>`;
    };
    reader.readAsText(file, 'UTF-8');
});

// ── اختيار اللوجو ────────────────────────────────────────────
logoInput.addEventListener('change', () => {
    const file = logoInput.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => { logoDataURL = e.target.result; };
    r.readAsDataURL(file);
});

showBtn.addEventListener('click', () => {
    if (!loadedExam) return;
    renderExam(loadedExam);
    printBtn.disabled = false;
    statusMsg.style.display = 'none';
});

printBtn.addEventListener('click', () => window.print());

// ── دالة العرض الرئيسية ──────────────────────────────────────
function renderExam(exam) {
    let html = `<div class="a4-page">`;
    const logoSrc = logoDataURL || 'logo.png';
    html += `<img src="${logoSrc}" class="logo-img" onerror="this.style.display='none'" alt="Logo">`;
    html += `<div class="exam-title">${esc(exam.title || '')}</div>`;

    (exam.sections || []).forEach(section => {
        html += `<div class="section">`;
        html += `<div class="section-title">${esc(section.section_title || '')}</div>`;

        const images  = section.images || [];
        const text    = section.text   || '';
        const lines   = text.split('\n');

        // ── تصنيف الصور حسب position ──
        const aboveImgs = images.filter(i => i.position === 'above');
        const rightImgs = images.filter(i => i.position === 'right');
        // أي position أخرى (below, inline...) نعاملها كـ right
        const otherImgs = images.filter(i => i.position !== 'above' && i.position !== 'right');

        // 1) صور "above" — تُعرض كشبكة فوق النص
        if (aboveImgs.length > 0) {
            html += `<div class="above-images">`;
            aboveImgs.forEach(img => {
                html += `<img src="${imgSrc(img.suggested_filename)}"
                              onerror="this.style.display='none'" alt="">`;
            });
            html += `</div>`;
        }

        // 2) صور "right" — كل صورة بجانب السطر المقابل
        const numberedLines = lines.filter(l => /^\d+[\.\)]\s/.test(l.trim()));
        const otherLines    = lines.filter(l => !/^\d+[\.\)]\s/.test(l.trim()) && l.trim() !== '');

        if (rightImgs.length > 0 && rightImgs.length === numberedLines.length) {
            // وصّل كل سطر مرقم بصورته
            numberedLines.forEach((line, idx) => {
                html += `<div class="question-row">
                    <span class="q-text">${esc(line)}</span>
                    <img src="${imgSrc(rightImgs[idx].suggested_filename)}"
                         class="q-img" onerror="this.style.display='none'" alt="">
                </div>`;
            });
            if (otherLines.length > 0) {
                html += `<div class="plain-text" style="margin-top:6px;">${otherLines.map(esc).join('<br>')}</div>`;
            }
        } else if (rightImgs.length > 0) {
            // عدد الصور لا يطابق الأسطر → اعرض النص ثم الصور في صف
            html += `<div class="plain-text">${lines.map(esc).join('<br>')}</div>`;
            html += `<div class="above-images" style="margin-top:8px;">`;
            rightImgs.forEach(img => {
                html += `<img src="${imgSrc(img.suggested_filename)}"
                              onerror="this.style.display='none'" alt="">`;
            });
            html += `</div>`;
        } else {
            // لا توجد صور right → اعرض النص فقط
            html += `<div class="plain-text">${lines.map(esc).join('<br>')}</div>`;
        }

        // 3) صور بـ position غير معروف
        if (otherImgs.length > 0) {
            html += `<div class="above-images" style="margin-top:8px;">`;
            otherImgs.forEach(img => {
                html += `<img src="${imgSrc(img.suggested_filename)}"
                              onerror="this.style.display='none'" alt="">`;
            });
            html += `</div>`;
        }

        html += `</div>`; // .section
    });

    html += `<footer>English Time 2 © 2025</footer>`;
    html += `</div>`;
    container.innerHTML = html;
}

// ── مسار الصورة ──────────────────────────────────────────────
function imgSrc(filename) {
    if (!filename) return '';
    return encodeURI(`English time 2/images/${filename}.jpg`);
}

// ── escape HTML ───────────────────────────────────────────────
function esc(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
