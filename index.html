<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time - Audio Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="English Zone Logo" class="logo" onerror="this.style.display='none'">
        
        <h2>🎧 English Time 2 – Audio Player</h2>
        
        <label for="partSelect">Choose section (Basic):</label>
        <select id="partSelect">
            <option value="A">Basic 2A (Units 1-6)</option>
            <option value="B">Basic 2B (Units 7-12)</option>
        </select>

        <label for="examSelect">Choose exam:</label>
        <select id="examSelect">
            <!-- populated by JavaScript -->
        </select>

        <button class="btn-play" onclick="playAudio()">🔊 Play Audio for Students</button>
        
        <audio id="audioPlayer" controls>
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div id="progress">Ready. Choose an exam and press Play.</div>
        <div id="statusMsg" class="status-msg"></div>
    </div>

    <script>
        const examsList = {
            "A": ["Exam1", "Exam2", "Exam3", "Exam4"],
            "B": ["Exam5", "Exam6", "Exam7", "Exam8"]
        };

        const partSelect = document.getElementById('partSelect');
        const examSelect = document.getElementById('examSelect');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const statusMsg = document.getElementById('statusMsg');

        function updateExams() {
            const part = partSelect.value;
            examSelect.innerHTML = '';
            examsList[part].forEach((exam, index) => {
                const option = document.createElement('option');
                option.value = exam;
                option.innerText = `Exam ${index + 1}`;
                examSelect.appendChild(option);
            });
            document.getElementById('progress').innerText = `Loaded Basic 2${part}`;
        }

        function playAudio() {
            const part = partSelect.value;
            const exam = examSelect.value;
            const audioFile = `English time 2/audio/ET2_${part}_${exam}.mp3`;
            audioSource.src = audioFile;
            audioPlayer.load();

            statusMsg.className = 'status-msg';
            document.getElementById('progress').innerText = "Loading audio...";

            audioPlayer.play().then(() => {
                statusMsg.className = 'status-msg status-success';
                statusMsg.innerText = `🎵 Now playing: Basic 2${part} - ${exam}`;
            }).catch(() => {
                statusMsg.className = 'status-msg status-error';
                statusMsg.innerText = "Audio file not found. Using text-to-speech instead.";
                const utterance = new SpeechSynthesisUtterance(`Listening test for Basic 2 ${part}, Exam ${exam}`);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            });
        }

        updateExams();
        partSelect.addEventListener('change', updateExams);
    </script>
</body>
</html>
