<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time - تشغيل الاختبارات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- شعار المعهد (ضع الملف في نفس المجلد) -->
        <img src="logo.png" alt="English Zone Logo" class="logo" onerror="this.style.display='none'">
        
        <h2>🎧 تشغيل اختبارات English Time</h2>
        
        <label for="bookSelect">اختر الكتاب:</label>
        <select id="bookSelect">
            <option value="ET1">English Time 1</option>
            <option value="ET2" selected>English Time 2</option>
            <option value="ET3">English Time 3</option>
        </select>

        <label for="partSelect">اختر الجزء:</label>
        <select id="partSelect">
            <option value="A">الجزء A (وحدات 1-6 + Midterm)</option>
            <option value="B">الجزء B (وحدات 7-12 + Final)</option>
        </select>

        <label for="testSelect">اختر الاختبار:</label>
        <select id="testSelect">
            <!-- سيتم تعبئة هذه القائمة تلقائياً بالوحدات -->
        </select>

        <button class="btn-play" onclick="playTest()">🔊 تشغيل الصوت للطلاب</button>
        
        <audio id="audioPlayer" controls>
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div id="progress">جاهز، اختر الاختبار واضغط تشغيل</div>
        <div id="statusMsg" class="status-msg"></div>
    </div>

    <!-- السكربت الخاص بالواجهة -->
    <script>
        // مصفوفة بأسماء الاختبارات (14 اختباراً)
        const testNames = {
            "A": ["U1", "U2", "U3", "U4", "U5", "U6", "Midterm"],
            "B": ["U7", "U8", "U9", "U10", "U11", "U12", "Final_Test"]
        };

        const bookSelect = document.getElementById('bookSelect');
        const partSelect = document.getElementById('partSelect');
        const testSelect = document.getElementById('testSelect');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const statusMsg = document.getElementById('statusMsg');

        // دالة لملء قائمة الاختبارات عند تغيير الجزء
        function updateTests() {
            const part = partSelect.value;
            testSelect.innerHTML = '';
            testNames[part].forEach(test => {
                let option = document.createElement('option');
                option.value = test;
                // تحسين عرض الاسم في القائمة
                option.innerText = test.replace('_', ' ').replace('U', 'Unit ');
                testSelect.appendChild(option);
            });
        }

        // الدالة الرئيسية لتشغيل الصوت
        function playTest() {
            const book = bookSelect.value;
            const part = partSelect.value;
            const test = testSelect.value;
            
            // بناء مسار ملف الصوت بناءً على هيكل المجلدات الذي وضعناه
            const audioFile = `${book}/audio/${book}_${part}_${test}.mp3`;
            audioSource.src = audioFile;
            audioPlayer.load();

            statusMsg.className = 'status-msg';
            document.getElementById('progress').innerText = "جاري تحميل الصوت...";

            audioPlayer.play().then(() => {
                statusMsg.className = 'status-msg status-success';
                statusMsg.innerText = `🎵 جاري التشغيل: ${book} - ${part} - ${test}`;
            }).catch(() => {
                // إذا لم يجد الصوت، يستخدم Text-to-Speech كبديل
                statusMsg.className = 'status-msg status-error';
                statusMsg.innerText = `ملف الصوت غير موجود في ${book}/audio/، سيتم قراءة النص بدلاً من ذلك.`;
                
                // تشغيل نطق تجريبي (يمكنك لاحقاً استبدال النص هنا بجلب النص الفعلي من ملفات JSON)
                const utterance = new SpeechSynthesisUtterance(`Listening test for ${book}, part ${part}, ${test}`);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            });
        }

        // تفعيل القوائم المنسدلة
        updateTests();
        partSelect.addEventListener('change', updateTests);
    </script>
</body>
</html>
