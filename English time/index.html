<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Time - تشغيل الاختبارات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="English Zone Logo" class="logo" onerror="this.style.display='none'">
        
        <h2>🎧 تشغيل اختبارات English Time 2</h2>
        
        <label for="partSelect">اختر القسم (Basic):</label>
        <select id="partSelect">
            <option value="A">Basic 2A (وحدات 1-6)</option>
            <option value="B">Basic 2B (وحدات 7-12)</option>
        </select>

        <label for="examSelect">اختر الاختبار:</label>
        <select id="examSelect">
            <!-- سيتم تعبئة هذه القائمة تلقائياً بأسماء الـ 4 اختبارات -->
        </select>

        <button class="btn-play" onclick="playAudio()">🔊 تشغيل الصوت للطلاب</button>
        
        <audio id="audioPlayer" controls>
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div id="progress">جاهز، اختر الاختبار واضغط تشغيل</div>
        <div id="statusMsg" class="status-msg"></div>
    </div>

    <script>
        // قائمة الاختبارات الثابتة بناءً على أسماء ملفات JSON التي أنشأتها
        const examsList = {
            "A": ["Exam1", "Exam2", "Exam3", "Exam4"],
            "B": ["Exam5", "Exam6", "Exam7", "Exam8"]
        };

        const partSelect = document.getElementById('partSelect');
        const examSelect = document.getElementById('examSelect');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const statusMsg = document.getElementById('statusMsg');

        // دالة لتحديث قائمة الاختبارات عند تغيير القسم
        function updateExams() {
            const part = partSelect.value;
            examSelect.innerHTML = '';
            examsList[part].forEach((exam, index) => {
                let option = document.createElement('option');
                option.value = exam;
                option.innerText = `الاختبار ${index + 1}`; // يظهر كـ الاختبار 1، 2، 3، 4
                examSelect.appendChild(option);
            });
            document.getElementById('progress').innerText = `تم تحميل Basic 2${part}`;
        }

        // الدالة الرئيسية لتشغيل الصوت
        function playAudio() {
            const part = partSelect.value;
            const exam = examSelect.value;
            
            // بناء مسار ملف الصوت بناءً على الهيكل: English time 2/audio/ET2_A_Exam1.mp3
            const audioFile = `English time 2/audio/ET2_${part}_${exam}.mp3`;
            audioSource.src = audioFile;
            audioPlayer.load();

            statusMsg.className = 'status-msg';
            document.getElementById('progress').innerText = "جاري تحميل الصوت...";

            audioPlayer.play().then(() => {
                statusMsg.className = 'status-msg status-success';
                statusMsg.innerText = `🎵 جاري التشغيل: Basic 2${part} - ${exam}`;
            }).catch(() => {
                // إذا لم يجد الصوت، يستخدم Text-to-Speech كبديل ذكي
                statusMsg.className = 'status-msg status-error';
                statusMsg.innerText = `ملف الصوت غير موجود في English time 2/audio/، سيتم قراءة النص تلقائياً.`;
                
                const utterance = new SpeechSynthesisUtterance(`Listening test for Basic 2 ${part}, Exam ${exam}`);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            });
        }

        // تفعيل القوائم عند التحميل
        updateExams();
        partSelect.addEventListener('change', updateExams);
    </script>
</body>
</html>
